<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viza</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Canvas -->
  <main id="canvasArea">
    <canvas id="graphCanvas"></canvas>
  </main>

  <!-- Brand badge (top-left) -->
  <div id="brand">
    <span class="brand-mark">V</span>
    <span class="brand-name" id="repoName"></span>
  </div>

  <!-- Floating toolbar (top-center) -->
  <nav id="toolbar">
    <button class="tb active" id="btnSelect" title="Select (V)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
    </button>
    <button class="tb" id="btnPan" title="Pan (H)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
    </button>
    <button class="tb" id="btnWire" title="Wire (W)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="5" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M7 7l10 10"/></svg>
    </button>
    <i class="sep"></i>
    <button class="tb" id="btnZoomOut" title="Zoom out (–)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="tb" id="btnFitAll" title="Fit all (F)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    </button>
    <button class="tb" id="btnZoomIn" title="Zoom in (+)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <i class="sep"></i>
    <button class="tb on" id="btnToggleEdges" title="Edges (E)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    </button>
    <button class="tb on" id="btnToggleLabels" title="Labels (L)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,7 4,4 20,4 20,7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button class="tb on" id="btnToggleGroups" title="Groups (G)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
  </nav>

  <!-- Search (top-right) -->
  <div id="searchBar">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search…" spellcheck="false" autocomplete="off">
    <kbd>/</kbd>
  </div>

  <!-- Sidebar toggle (bottom-left) -->
  <button id="sidebarToggle" title="Files (Tab)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
  </button>

  <!-- File tree sidebar -->
  <aside id="sidebar" class="closed">
    <div class="sb-head">
      <span class="sb-title">Files</span>
      <button class="icon-btn" id="sidebarClose">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sb-tree" id="fileTree"></div>
    <div class="sb-foot" id="legend"></div>
  </aside>

  <!-- Detail panel -->
  <aside id="detailPanel" class="closed">
    <div class="dp-head">
      <div class="dp-title-row">
        <span class="dp-dot" id="detailDot"></span>
        <h3 id="detailName"></h3>
      </div>
      <button class="icon-btn" id="closeDetail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dp-body">
      <section class="dp-sec" id="detailInfo"></section>
      <section class="dp-sec">
        <h4>Connections</h4>
        <div id="detailConnections"></div>
      </section>
      <section class="dp-sec">
        <h4>Symbols</h4>
        <div id="detailSymbols"></div>
      </section>
      <section class="dp-sec" id="editorSection" style="display:none">
        <div class="editor-head">
          <h4 id="editorTitle">Code</h4>
          <div class="editor-actions">
            <span class="editor-status" id="editorStatus"></span>
            <button class="btn-sm" id="btnSaveCode" title="Save (Ctrl+S)">Save</button>
          </div>
        </div>
        <textarea id="codeEditor" spellcheck="false" autocomplete="off" autocorrect="off"></textarea>
        <div class="editor-meta" id="editorMeta"></div>
      </section>
      <section class="dp-sec" id="previewSection">
        <h4>Preview</h4>
        <pre class="dp-code"><code id="detailCode"></code></pre>
      </section>
    </div>
  </aside>

  <!-- Stats badge (bottom-right) -->
  <div id="stats">
    <span id="statFiles">0 files</span>
    <span class="s-dot"></span>
    <span id="statEdges">0 connections</span>
  </div>

  <!-- Context menu -->
  <div id="contextMenu" class="ctx closed">
    <div class="ctx-item" data-action="focus">Focus</div>
    <div class="ctx-item" data-action="expand">Expand / Collapse</div>
    <div class="ctx-item" data-action="connections">Highlight connections</div>
    <div class="ctx-item" data-action="isolate">Isolate</div>
    <div class="ctx-item" data-action="hide">Hide</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="addFunction">+ New function</div>
    <div class="ctx-item" data-action="newFile">+ New file</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="showAll">Show all</div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="ld">
      <div class="ld-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <script src="graph.js"></script>
  <script src="app.js"></script>
</body>
</html>
